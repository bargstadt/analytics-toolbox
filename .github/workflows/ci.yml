name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # report every Python version's result, don't cancel siblings
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        # Single dependency set (no extras) — installs the whole toolbox.
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check .

      - name: Pytest
        run: poetry run pytest

  security-audit:
    name: Dependency audit (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry + export plugin
        # `poetry export` is not bundled with Poetry 2.x core — inject the plugin.
        run: |
          pipx install poetry
          pipx inject poetry poetry-plugin-export

      - name: Export full dependency surface
        # Audit everything: runtime deps and the dev group (pytest, ruff, pip-audit).
        # A compromised dev/CI tool is a real supply-chain risk even though it never
        # ships, so it is gated alongside shipped deps.
        run: >-
          poetry export --with dev --format requirements.txt
          --output requirements-audit.txt --without-hashes

      - name: pip-audit
        # Fails the job on any known vulnerability in the dependency set.
        # --strict additionally fails if a dependency cannot be audited, so an
        # un-resolvable package can never silently pass the gate.
        run: pipx run pip-audit --requirement requirements-audit.txt --strict
